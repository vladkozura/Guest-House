<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Меню</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #fafafa;
    }

    /* Панель меню */
    .top-panel {
      background-color: #333;
      overflow: hidden;
      display: flex;
      justify-content: center;
      padding: 15px 0;
    }

    .top-panel button {
      background-color: #555;
      color: white;
      border: none;
      margin: 0 10px;
      padding: 15px 25px; /* збільшений розмір кнопок */
      font-size: 18px;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .top-panel button:hover {
      background-color: #777;
    }

    /* Кнопка "Вгору" */
    #scrollTopBtn {
      display: none;
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 99;
      font-size: 22px;
      border: none;
      outline: none;
      background-color: #333;
      color: white;
      cursor: pointer;
      padding: 15px 20px;
      border-radius: 10px;
      transition: background-color 0.3s;
    }

    #scrollTopBtn:hover {
      background-color: #555;
    }

    .content {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }
  </style>
</head>
<body>

  <div class="top-panel">
    <button>Головна</button>
    <button>Меню</button>
    <button>Про нас</button>
    <button>Контакти</button>
  </div>

  <div class="content">
    <!-- Тут встав оригінальний контент твого menu.html без змін -->
    ... (текст меню з цінами)
  </div>

  <button onclick="topFunction()" id="scrollTopBtn" title="До гори">↑</button>

  <script>
    const scrollTopBtn = document.getElementById("scrollTopBtn");

    window.onscroll = function() {
      scrollFunction();
    };

    function scrollFunction() {
      if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
        scrollTopBtn.style.display = "block";
      } else {
        scrollTopBtn.style.display = "none";
      }
    }

    function topFunction() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>

</body>
</html>
