<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Меню — Гостинний Двір</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="style.css">

  <style>
    /* ЗБІЛЬШЕНІ КНОПКИ ВЕРХНЬОЇ ПАНЕЛІ */
    .navbar-nav .nav-link {
      font-size: 1.35rem;
      padding: 0.9rem 1.5rem;
    }

    /* ПЛАВНИЙ СКРОЛ ПО СТОРІНЦІ */
    html {
      scroll-behavior: smooth;
    }

    /* КНОПКА ПОВЕРНЕННЯ НА ПОЧАТОК */
    #scrollTopBtn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 999;
      display: none;
      background: rgba(0,0,0,0.75);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.4);
      padding: 12px 18px;
      border-radius: 50px;
      font-size: 1.3rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    #scrollTopBtn:hover {
      background: #000;
      transform: translateY(-4px);
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">Гостинний Двір</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="index.html">Головна</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="menu.html">Меню</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="contacts.html">Контакти</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- ВІДСТУП ПІД ФІКСОВАНЕ МЕНЮ -->
<div style="height:100px"></div>

<!-- ===== ТУТ ЙДЕ ВЕСЬ ТВОЙ ІСНУЮЧИЙ КОНТЕНТ МЕНЮ БЕЗ БУДЬ-ЯКИХ ЗМІН ===== -->

<!-- КНОПКА СКРОЛУ НАГОРУ -->
<button id="scrollTopBtn" title="На початок">↑</button>

<script>
  const scrollBtn = document.getElementById('scrollTopBtn');

  window.addEventListener('scroll', () => {
    if (window.pageYOffset > 400) {
      scrollBtn.style.display = 'block';
    } else {
      scrollBtn.style.display = 'none';
    }
  });

  scrollBtn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
</script>

</body>
</html>
